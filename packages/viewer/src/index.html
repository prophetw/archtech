<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>图片浏览器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #eee;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    /* 连接面板 */
    #connect-panel {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    #connect-panel h2 { margin-bottom: 8px; font-size: 1.4em; }
    #connect-panel .hint { font-size: 13px; color: #666; margin-bottom: 24px; }
    .field {
      width: 100%; max-width: 320px; margin-bottom: 12px;
    }
    .field label {
      display: block; font-size: 13px; color: #888; margin-bottom: 6px;
    }
    .field input {
      width: 100%; padding: 12px 16px;
      border: 1px solid #444; border-radius: 10px; background: #1a1a1a;
      color: #fff; font-size: 16px; text-align: center;
    }
    #connect-panel button {
      width: 100%; max-width: 320px; margin-top: 8px; padding: 14px;
      border: none; border-radius: 10px; background: #3b82f6;
      color: #fff; font-size: 16px; font-weight: 600; cursor: pointer;
    }
    #connect-panel button:disabled { opacity: 0.5; }
    .error-msg { color: #ef4444; font-size: 13px; margin-top: 8px; display: none; }
    /* 画廊 */
    #gallery { display: none; padding: 8px; padding-bottom: 80px; }
    #gallery h3 { padding: 12px 8px; font-size: 1em; color: #888; }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
    }
    .grid img {
      width: 100%; aspect-ratio: 1; object-fit: cover;
      border-radius: 4px; cursor: pointer;
      background: #1a1a1a; transition: opacity 0.2s;
    }
    .grid img:active { opacity: 0.7; }
    .grid .placeholder {
      grid-column: 1/-1; text-align: center; color: #555; padding: 40px;
      font-size: 14px;
    }
    /* 大图预览 */
    #viewer-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      z-index: 100; flex-direction: column; align-items: center; justify-content: center;
    }
    #viewer-overlay img { max-width: 100%; max-height: 80vh; object-fit: contain; }
    #viewer-overlay .close {
      position: absolute; top: 16px; right: 16px;
      width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15);
      border: none; color: #fff; font-size: 24px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #viewer-overlay .name { margin-top: 12px; color: #aaa; font-size: 14px; }
    .loading { text-align: center; color: #555; padding: 20px; }
    /* 状态栏 */
    #status {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      padding: 12px; background: rgba(15,15,15,0.9); backdrop-filter: blur(10px);
      text-align: center; font-size: 13px; color: #888;
    }
    .dot-green { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-right: 6px; }
    .dot-red   { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #ef4444; margin-right: 6px; }
    /* spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 24px; height: 24px; border: 2px solid #333; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.6s linear infinite; margin: 20px auto;
    }
  </style>
</head>
<body>

  <!-- 连接面板 -->
  <div id="connect-panel">
    <h2>📷 图片浏览器</h2>
    <p class="hint">扫码自动填入，或手动输入</p>
    <div class="field">
      <label>房间 ID</label>
      <input id="room-input" type="text" placeholder="img_xxxxxxxx_1234567890" />
    </div>
    <div class="field">
      <label>房间密码</label>
      <input id="password-input" type="text" placeholder="6位密码" maxlength="6" autocomplete="off" />
    </div>
    <button id="connect-btn">连接</button>
    <div class="error-msg" id="error-msg"></div>
    <div class="spinner" id="spinner" style="display:none"></div>
  </div>

  <!-- 画廊 -->
  <div id="gallery">
    <h3 id="gallery-title"></h3>
    <div class="grid" id="image-grid">
      <div class="loading">加载中...</div>
    </div>
  </div>

  <!-- 大图 -->
  <div id="viewer-overlay">
    <button class="close" id="close-viewer">✕</button>
    <img id="viewer-img" src="" alt="" />
    <div class="name" id="viewer-name"></div>
  </div>

  <!-- 状态栏 -->
  <div id="status"><span class="dot-green"></span>已连接</div>

  <script type="module">
    import { io } from 'https://cdn.socket.io/4.8.0/socket.io.esm.min.js';

    const RELAY_URL = new URLSearchParams(location.search).get('relay') || location.origin;

    let socket = null;
    let roomId = '';

    // ---- DOM ----
    const $ = (id) => document.getElementById(id);
    const connectPanel = $('connect-panel');
    const gallery = $('gallery');
    const imageGrid = $('image-grid');
    const errorMsg = $('error-msg');
    const spinner = $('spinner');
    const statusBar = $('status');
    const roomInput = $('room-input');
    const passwordInput = $('password-input');

    // ---- 自动读取 URL 参数（扫码场景）----
    const urlRoom = new URLSearchParams(location.search).get('room');
    const urlPassword = new URLSearchParams(location.search).get('password');
    if (urlRoom) roomInput.value = urlRoom;
    if (urlPassword) passwordInput.value = urlPassword;

    // ---- 连接 ----
    $('connect-btn').addEventListener('click', () => {
      const id = roomInput.value.trim();
      const pw = passwordInput.value.trim();
      if (!id) { showError('请输入房间 ID'); return; }
      if (!pw) { showError('请输入房间密码'); return; }
      connect(id, pw);
    });

    // 回车也可以触发
    passwordInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') $('connect-btn').click();
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }
    function hideError() { errorMsg.style.display = 'none'; }

    function setLoading(loading) {
      $('connect-btn').disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
    }

    function connect(id, password) {
      roomId = id;
      hideError();
      setLoading(true);

      socket = io(RELAY_URL, { transports: ['websocket', 'polling'] });

      socket.on('connect', () => {
        socket.emit('viewer:join', roomId, password, (res) => {
          setLoading(false);

          if (!res.ok) {
            showError(res.error || '加入失败');
            socket.disconnect();
            return;
          }

          // 成功进入
          connectPanel.style.display = 'none';
          gallery.style.display = 'block';
          statusBar.style.display = 'block';
          $('gallery-title').textContent = `📂 ${roomId}`;
          statusBar.innerHTML = '<span class="dot-green"></span>已连接';

          // 请求图片列表
          socket.emit('cmd:list', roomId);
        });
      });

      socket.on('connect_error', () => {
        setLoading(false);
        showError('无法连接服务器，请检查网络');
      });

      // ---- 收到图片列表 ----
      socket.on('res:list', (files) => {
        if (files.length === 0) {
          imageGrid.innerHTML = '<div class="placeholder">📭 暂无图片</div>';
          return;
        }
        imageGrid.innerHTML = files.map((f, i) => {
          const name = encodeURIComponent(f);
          // 缩略图也走 socket，避免多余请求
          return `<img src="" alt="${f}" data-filename="${f}" data-loaded="0" loading="lazy"
            style="background:#1a1a1a" />`;
        }).join('');

        // 点击看大图
        imageGrid.querySelectorAll('img').forEach((img) => {
          img.addEventListener('click', () => openViewer(img.dataset.filename));
        });

        // 延迟加载缩略图
        loadThumbnails(files);
      });

      // ---- 收到单张图片 ----
      socket.on('res:image', (data) => {
        // 缩略图
        const thumb = imageGrid.querySelector(`[data-filename="${CSS.escape(data.filename)}"]`);
        if (thumb && thumb.dataset.loaded === '0') {
          thumb.src = `data:${data.mime};base64,${data.data}`;
          thumb.dataset.loaded = '1';
        }
        // 大图
        if ($('viewer-overlay').style.display === 'flex' && $('viewer-name').textContent === data.filename) {
          $('viewer-img').src = `data:${data.mime};base64,${data.data}`;
        }
      });

      // ---- 断开 ----
      socket.on('disconnect', () => {
        statusBar.innerHTML = '<span class="dot-red"></span>已断开';
      });
    }

    // 批量请求缩略图（避免一次性请求全部，做个简单队列）
    async function loadThumbnails(files) {
      for (const f of files) {
        if (!socket?.connected) break;
        socket.emit('cmd:image', roomId, f);
        // 每张间隔 100ms，避免拥塞
        await new Promise((r) => setTimeout(r, 100));
      }
    }

    // ---- 大图预览 ----
    function openViewer(filename) {
      $('viewer-img').src = '';
      $('viewer-name').textContent = filename;
      $('viewer-overlay').style.display = 'flex';
      // 请求原图
      socket.emit('cmd:image', roomId, filename);
    }

    $('close-viewer').addEventListener('click', () => {
      $('viewer-overlay').style.display = 'none';
    });
    $('viewer-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) $('viewer-overlay').style.display = 'none';
    });
  </script>
</body>
</html>
