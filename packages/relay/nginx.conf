# ============================================================
# image-browser 中继服务器 Nginx 配置
# 部署路径：/etc/nginx/sites-available/image-browser
# 启用：    ln -s /etc/nginx/sites-available/image-browser /etc/nginx/sites-enabled/
# 验证：    nginx -t
# 重载：    nginx -s reload
# ============================================================

# ---- 速率限制定义 ----
# 每个 IP 每分钟最多 30 个连接
limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

# Socket.IO 路径请求速率限制：每秒 20 个请求，突发 30
limit_req_zone $binary_remote_addr zone=socketio_req:10m rate=20r/s;

# 房间创建速率（host:register）：每分钟每 IP 最多 5 个房间
limit_req_zone $binary_remote_addr zone=room_create:10m rate=5r/m;

# ---- HTTP → HTTPS 重定向 ----
server {
    listen 80;
    server_name relay.your-domain.com;

    # 仅重定向，不接受其他请求
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- 主服务 ----
server {
    listen 443 ssl http2;
    server_name relay.your-domain.com;

    # ====== SSL 证书（使用 Certbot 自动管理）======
    ssl_certificate     /etc/letsencrypt/live/relay.your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/relay.your-domain.com/privkey.pem;

    # 现代 SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Content-Type-Options  "nosniff" always;
    add_header X-Frame-Options        "DENY" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "no-referrer" always;

    # 日志
    access_log /var/log/nginx/image-browser-access.log;
    error_log  /var/log/nginx/image-browser-error.log;

    # 最大请求体（图片上传用，虽然目前是 base64 走 socket）
    client_max_body_size 20m;

    # ====== 静态文件（Viewer 页面）======
    location / {
        root /opt/image-browser/packages/viewer/dist;
        try_files $uri $uri/ /index.html;

        # 每个 IP 最多 10 个并发连接
        limit_conn conn_per_ip 10;
    }

    # ====== 健康检查（本地只允许）======
    location /health {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
    }

    # ====== Socket.IO WebSocket 代理 ======
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # WebSocket 升级
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 透传客户端信息
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时：WebSocket 长连接不要断
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;

        # 禁用缓冲（WebSocket 需要实时）
        proxy_buffering off;

        # 速率限制
        limit_req  zone=socketio_req burst=30 nodelay;
        limit_conn conn_per_ip 20;
    }

    # ====== 禁止访问隐藏文件 ======
    location ~ /\. {
        deny all;
        access_log off;
    }
}
